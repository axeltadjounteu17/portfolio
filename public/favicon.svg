<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fond sombre (bleu très profond) -->
  <rect width="100" height="100" rx="24" fill="#0f172a" />
  
  <!-- Texte principal "A" (Blanc) et "TN" (Bleu clair) -->
  <text x="50" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="900" text-anchor="middle" letter-spacing="-2">
    <tspan fill="#ffffff">A</tspan><tspan fill="#3b82f6">TN</tspan>
  </text>
  
  <!-- Petite barre décorative -->
  <path d="M 35 75 L 65 75" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" />
</svg>
